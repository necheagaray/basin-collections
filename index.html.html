<style>
  :root{
    --neon-cyan: #22e5ff;
    --neon-pink: #ff2fb0;
    --neon-amber: #ffb020;
    --neon-green: #26ffb0;
    --bg-0: #0a0e17;
    --bg-1: #0f1420;
    --bg-2: #151b2b;
    --bg-3: #1c2438;
    --border-1: #2a3352;
  }
  html,body{ background: var(--bg-0); }
  body{ font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif; }
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background: var(--bg-1); }
  ::-webkit-scrollbar-thumb{ background: var(--border-1); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover{ background: var(--neon-cyan); }

  .glass{
    background: linear-gradient(180deg, rgba(28,36,56,0.7), rgba(15,20,32,0.7));
    border: 1px solid var(--border-1);
    backdrop-filter: blur(8px);
  }
  .neon-text{
    color: var(--neon-cyan);
    text-shadow: 0 0 12px rgba(34,229,255,0.55);
  }
  .btn{
    display:inline-flex; align-items:center; gap:.5rem;
    padding: .5rem .9rem; border-radius: .6rem; font-weight: 600; font-size:.85rem;
    transition: all .15s ease; border:1px solid transparent; cursor:pointer;
  }
  .btn-primary{ background: linear-gradient(135deg, var(--neon-cyan), #0891b2); color:#04141a; box-shadow: 0 0 18px rgba(34,229,255,.35); }
  .btn-primary:hover{ box-shadow: 0 0 26px rgba(34,229,255,.6); transform: translateY(-1px); }
  .btn-ghost{ background: var(--bg-3); color:#cbd5e1; border-color: var(--border-1); }
  .btn-ghost:hover{ border-color: var(--neon-cyan); color: var(--neon-cyan); }
  .btn-danger{ background: rgba(255,47,47,.12); color:#ff6b6b; border-color: rgba(255,47,47,.35); }
  .btn-danger:hover{ background: rgba(255,47,47,.2); }
  .input{
    background: var(--bg-2); border:1px solid var(--border-1); color:#e2e8f0;
    border-radius:.5rem; padding:.5rem .75rem; outline:none; font-size:.9rem;
  }
  .input:focus{ border-color: var(--neon-cyan); box-shadow: 0 0 0 3px rgba(34,229,255,.15); }

  @keyframes siren-sweep{
    0%{ box-shadow: 0 0 0px 0px rgba(255,47,176,.0), inset 0 0 0px rgba(255,176,32,0); }
    50%{ box-shadow: 0 0 40px 6px rgba(255,47,176,.45), inset 0 0 30px rgba(255,176,32,.12); }
    100%{ box-shadow: 0 0 0px 0px rgba(255,47,176,.0), inset 0 0 0px rgba(255,176,32,0); }
  }
  .siren-border{ animation: siren-sweep 2.2s ease-in-out infinite; border: 1px solid rgba(255,47,176,.5); }

  @keyframes text-flicker{
    0%,19%,21%,23%,25%,54%,56%,100%{ opacity:1; }
    20%,24%,55%{ opacity:.55; }
  }
  .flicker{ animation: text-flicker 3.4s linear infinite; }

  @keyframes rotate-hue{
    0%{ filter: hue-rotate(0deg); } 100%{ filter: hue-rotate(360deg); }
  }
  .alarm-strip{ animation: rotate-hue 6s linear infinite; }

  @keyframes pop-in{
    from{ opacity:0; transform: translateY(6px) scale(.98); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }
  .pop-in{ animation: pop-in .18s ease-out; }

  .age-chip-safe{ background: rgba(38,255,176,.12); color: var(--neon-green); border:1px solid rgba(38,255,176,.35);}
  .age-chip-watch{ background: rgba(255,176,32,.12); color: var(--neon-amber); border:1px solid rgba(255,176,32,.35);}
  .age-chip-danger{ background: rgba(255,47,47,.14); color:#ff7a7a; border:1px solid rgba(255,47,47,.4);}

  .avatar{
    width:1.9rem; height:1.9rem; border-radius:9999px; display:flex; align-items:center; justify-content:center;
    font-size:.7rem; font-weight:800; letter-spacing:.02em; flex-shrink:0;
  }
</style>

function parseAgedARWorkbook(workbook) {
    const sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, dateNF: 'yyyy-mm-dd', defval: "" });
    let headerIdx = rows.findIndex(r => (r[0] || "").toString().trim() === "Customer" && (r[1] || "").toString().trim() === "Transaction Type");
    if (headerIdx === -1)
        throw new Error("Couldn't find the header row (Customer / Transaction Type / …). Is this an A/R Aging Detail export?");
    let currentCustomer = null;
    const invoices = [];
    for (let i = headerIdx + 1; i < rows.length; i++) {
        const r = rows[i] || [];
        const col0 = (r[0] || "").toString().trim();
        const txnType = (r[1] || "").toString().trim();
        if (col0 && col0.startsWith("Total -")) {
            currentCustomer = null;
            continue;
        }
        if (col0 && !txnType) {
            currentCustomer = col0;
            continue;
        }
        if (!currentCustomer)
            continue;
        if (txnType === "Invoice") {
            const docNum = (r[3] || "").toString().trim();
            if (!docNum)
                continue;
            invoices.push({
                customer: currentCustomer,
                invoice_date: r[2] || null,
                document_number: docNum,
                po_number: (r[4] || "").toString().trim() || null,
                due_date: r[5] || null,
                age: parseInt(r[6], 10) || 0,
                open_balance: parseFloat(r[7]) || 0,
            });
        }
    }
    if (invoices.length === 0)
        throw new Error("No invoice rows found in this file.");
    return invoices;

async function syncInvoices(parsedInvoices, uploaderName, uploadLabel) {
    // 1) Ensure all customers exist
    const customerNames = [...new Set(parsedInvoices.map(i => i.customer))];
    const { data: existingCustomers, error: custErr } = await db.from('customers').select('id,name');
    if (custErr)
        throw custErr;
    const nameToId = new Map(existingCustomers.map(c => [c.name, c.id]));
    const newCustomerNames = customerNames.filter(n => !nameToId.has(n));
    if (newCustomerNames.length) {
        const { data: inserted, error } = await db.from('customers')
            .insert(newCustomerNames.map(name => ({ name }))).select('id,name');
        if (error)
            throw error;
        inserted.forEach(c => nameToId.set(c.name, c.id));
    }
    // 2) Upsert invoices (match by document_number, preserves id -> preserves notes)
    const rows = parsedInvoices.map(inv => ({
        document_number: inv.document_number,
        customer_id: nameToId.get(inv.customer),
        po_number: inv.po_number,

        open_balance: inv.open_balance,

    const addedCount = [...afterSet].filter(d => !beforeSet.has(d)).length;
    const CHUNK = 300;

            if (error)

        }

        upload_label: uploadLabel,
