  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background: var(--bg-2); }
  ::-webkit-scrollbar-thumb{ background: var(--border-1); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover{ background: var(--neon-cyan); }

  .glass{
    background-image: var(--grain), linear-gradient(180deg, var(--bg-1), rgba(240,234,216,0.7));
    background-repeat: repeat, no-repeat;
    background-size: 140px 140px, 100% 100%;
    border: 1px solid var(--border-1);
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(120,100,60,0.08);
  }
  .glass-sage{
    background-image: var(--grain), linear-gradient(160deg, rgba(219,231,205,0.85), rgba(198,217,182,0.55));
    border-color: rgba(79,122,69,0.3);
  }
  .glass-lavender{
    background-image: var(--grain), linear-gradient(160deg, rgba(228,220,238,0.85), rgba(210,197,226,0.55));
    border-color: rgba(138,111,168,0.28);
  }
  .glass-honey{
    background-image: var(--grain), linear-gradient(160deg, rgba(240,225,190,0.85), rgba(230,208,163,0.55));
    border-color: rgba(168,121,31,0.3);
  }
  .glass-terracotta{
    background-image: var(--grain), linear-gradient(160deg, rgba(238,213,200,0.85), rgba(224,188,172,0.55));
    border-color: rgba(168,80,58,0.3);
  }
  .neon-text{
    color: var(--neon-cyan);
    text-shadow: 0 0 14px rgba(63,110,107,0.22);
  }
  .btn{
    display:inline-flex; align-items:center; gap:.5rem;
    padding: .5rem .9rem; border-radius: .6rem; font-weight: 600; font-size:.85rem;
    transition: all .15s ease; border:1px solid transparent; cursor:pointer;
  }
  .btn-primary{ background: linear-gradient(135deg, var(--neon-cyan), #2f5350); color:#fbf8f0; box-shadow: 0 2px 14px rgba(63,110,107,.28); }
  .btn-primary:hover{ box-shadow: 0 4px 20px rgba(63,110,107,.4); transform: translateY(-1px); }
  .btn-ghost{ background: var(--bg-3); color: var(--ink); border-color: var(--border-1); }
  .btn-ghost:hover{ border-color: var(--neon-cyan); color: var(--neon-cyan); }
  .btn-danger{ background: rgba(168,80,58,.1); color:#8a4029; border-color: rgba(168,80,58,.3); }
  .btn-danger:hover{ background: rgba(168,80,58,.18); }
  .input{
    background: var(--bg-2); border:1px solid var(--border-1); color: var(--ink);
    border-radius:.5rem; padding:.5rem .75rem; outline:none; font-size:.9rem;
  }
  .input:focus{ border-color: var(--neon-cyan); box-shadow: 0 0 0 3px rgba(63,110,107,.14); }

  @keyframes siren-sweep{
    0%{ box-shadow: 0 0 0px 0px rgba(168,80,58,0), inset 0 0 0px rgba(168,121,31,0); }
    50%{ box-shadow: 0 0 30px 5px rgba(168,80,58,.3), inset 0 0 22px rgba(168,121,31,.1); }
    100%{ box-shadow: 0 0 0px 0px rgba(168,80,58,0), inset 0 0 0px rgba(168,121,31,0); }
  }
  .siren-border{ animation: siren-sweep 2.6s ease-in-out infinite; border: 1px solid rgba(168,80,58,.4); }

  @keyframes text-flicker{
    0%,19%,21%,23%,25%,54%,56%,100%{ opacity:1; }
    20%,24%,55%{ opacity:.6; }
  }
  .flicker{ animation: text-flicker 3.4s linear infinite; }

  @keyframes rotate-hue{
    0%{ filter: hue-rotate(0deg); } 100%{ filter: hue-rotate(360deg); }
  }
  .alarm-strip{ animation: rotate-hue 6s linear infinite; }

  @keyframes pop-in{
    from{ opacity:0; transform: translateY(6px) scale(.98); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }
  .pop-in{ animation: pop-in .18s ease-out; }

  .age-chip-safe{ background: rgba(79,122,69,.14); color:#3f6236; border:1px solid rgba(79,122,69,.35);}
  .age-chip-watch{ background: rgba(168,121,31,.14); color:#8a641c; border:1px solid rgba(168,121,31,.35);}
